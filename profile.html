<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile Settings</title>
    <style>
        :root { --bg-color: #000000; --text-main: #f5f5f7; --text-muted: #86868b; --card-bg: rgba(28, 28, 30, 0.7); --border-color: rgba(255, 255, 255, 0.1); --accent: #0a84ff; --danger: #ff453a; --gold: #ffd60a;}
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; color-scheme: dark;}
        
        .header-bar { width: 100%; max-width: 900px; box-sizing: border-box; padding: 20px 0; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; background: var(--bg-color);}
        .back-btn { display: flex; align-items: center; color: var(--accent); text-decoration: none; font-size: 16px; font-weight: 500; }
        .back-btn svg { width: 24px; height: 24px; fill: currentColor; margin-right: 5px; }
        
        .token-pill { display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.1); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-color); font-size: 16px; font-weight: 600;}
        .token-pill svg { width: 18px; height: 18px; fill: var(--gold); }

        .container { width: 100%; max-width: 900px; display: flex; gap: 30px; padding: 20px 0; box-sizing: border-box; }
        
        .sidebar { width: 240px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-btn { text-align: left; padding: 12px 20px; background: transparent; border: none; color: var(--text-muted); font-size: 16px; font-weight: 600; cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .sidebar-btn.active { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .sidebar-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }

        .content-area { flex: 1; }
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .profile-pic-large { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); background: #1c1c1e; }
        .change-photo-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .change-photo-btn:hover { background: rgba(255,255,255,0.15); }
        .change-photo-btn input { display: none; }

        .info-group { background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-size: 16px; font-weight: 500; }
        .info-value { font-size: 16px; color: var(--text-muted); display: flex; align-items: center; gap: 10px;}
        
        .edit-btn { background: none; border: none; color: var(--accent); font-size: 15px; font-weight: 500; cursor: pointer; padding: 0;}
        .delete-btn-full { width: 100%; background: rgba(255, 69, 58, 0.1); color: var(--danger); border: 1px solid rgba(255, 69, 58, 0.3); padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; font-size: 16px;}
        .delete-btn-full:hover { background: var(--danger); color: white; }

        .lang-option { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: 0.2s;}
        .lang-option:last-child { border-bottom: none; }
        .lang-option:hover { background: rgba(255,255,255,0.05); }
        .lang-check { display: none; color: var(--accent); font-weight: bold;}
        .lang-option.active .lang-check { display: block; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(20px); padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; transition: transform 0.4s; z-index: 9999; color: white; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px;}
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: rgba(40, 10, 10, 0.95); border-color: var(--danger); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(-50%); } 25% { transform: translateX(-55%); } 75% { transform: translateX(-45%); } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;}
        .modal-box { background: rgba(40, 40, 40, 0.95); backdrop-filter: blur(30px); width: 100%; max-width: 320px; border-radius: 14px; text-align: center; border: 1px solid var(--border-color); }
        .modal-content { padding: 30px 20px; }
        .modal-input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; outline: none; background: rgba(0,0,0,0.3); color: white; margin-top: 15px;}
        .modal-actions { display: flex; border-top: 1px solid var(--border-color); }
        .modal-btn { flex: 1; padding: 14px; border: none; background: transparent; font-size: 16px; cursor: pointer; color: var(--accent); font-weight: 500;}
        .modal-btn.cancel { border-right: 1px solid var(--border-color); color: var(--text-main); font-weight: 400;}

        .crop-box { background: #1c1c1e; border-radius: 18px; overflow: hidden; width: 100%; max-width: 340px; text-align: center; border: 1px solid var(--border-color); animation: popIn 0.3s; display: flex; flex-direction: column;}
        .crop-header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid var(--border-color); background: rgba(255,255,255,0.05);}
        .crop-header button { background: none; border: none; font-size: 16px; font-weight: 500; cursor: pointer; color: var(--text-main); }
        .crop-header .done { color: var(--accent); font-weight: bold; }
        .canvas-container { position: relative; width: 100%; max-width: 340px; aspect-ratio: 1/1; background: #000; overflow: hidden; touch-action: none;}
        #cropCanvas { position: absolute; top: 0; left: 0; cursor: grab;}
        #cropCanvas:active { cursor: grabbing; }
        .crop-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(circle 150px at center, transparent 99%, rgba(0,0,0,0.7) 100%); }
        .crop-footer { padding: 20px; display: flex; align-items: center; gap: 15px; border-top: 1px solid var(--border-color); background: rgba(255,255,255,0.05);}
        .zoom-slider { -webkit-appearance: none; width: 100%; background: transparent; }
        .zoom-slider::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--border-color); border-radius: 2px; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: white; margin-top: -6px; }

        @media (max-width: 768px) {
            .container { flex-direction: column; gap: 20px;}
            .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
            .sidebar-btn { flex: 1; text-align: center; white-space: nowrap;}
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="header-bar">
    <a href="music.html" class="back-btn"><svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg> <span data-i18n="back">Back</span></a>
    <div class="token-pill">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.64-2.14 1.64-1.4 0-2.1-.68-2.14-1.7H8.08c.04 1.56 1.27 2.65 2.82 2.97V19h2.34v-1.67c1.52-.29 2.72-1.16 2.73-2.77-.01-2.2-1.9-2.96-3.66-3.42z"/></svg>
        <span id="valTokensHeader">0</span>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <button class="sidebar-btn active" onclick="switchView('account')" id="btn-account" data-i18n="account">Account</button>
        <button class="sidebar-btn" onclick="switchView('language')" id="btn-language" data-i18n="language">Language</button>
    </div>

    <div class="content-area">
        <div id="view-account" class="view-section active">
            <div class="profile-header">
                <img id="profDisplay" class="profile-pic-large" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2386868b'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
                <label class="change-photo-btn">
                    <span data-i18n="changePhoto">Change Photo</span>
                    <input type="file" id="photoInput" accept="image/*">
                </label>
            </div>

            <div class="info-group">
                <div class="info-row">
                    <span class="info-label" data-i18n="username">Username</span>
                    <span class="info-value"><span id="valUsername">...</span> <button class="edit-btn" onclick="openInputModal('username')" data-i18n="edit">Edit</button></span>
                </div>
            </div>

            <div class="info-group">
                <div class="info-row">
                    <span class="info-label" data-i18n="email">Email</span>
                    <span class="info-value"><span id="valEmail">-</span> <button class="edit-btn" onclick="openInputModal('email')" data-i18n="edit">Edit</button></span>
                </div>
                <div class="info-row">
                    <span class="info-label" data-i18n="phone">Phone Number</span>
                    <span class="info-value"><span id="valPhone">-</span> <button class="edit-btn" onclick="openInputModal('phone')" data-i18n="edit">Edit</button></span>
                </div>
            </div>

            <button class="delete-btn-full" onclick="openDeleteModal()" data-i18n="deleteAccount">Delete Account</button>
        </div>

        <div id="view-language" class="view-section">
            <div class="info-group">
                <div class="lang-option" id="lang-en" onclick="triggerLangChange('en')">
                    <span>English</span><span class="lang-check">✓</span>
                </div>
                <div class="lang-option" id="lang-zh" onclick="triggerLangChange('zh')">
                    <span>中文 (Chinese)</span><span class="lang-check">✓</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="inputModal">
    <div class="modal-box">
        <div class="modal-content">
            <h3 style="margin: 0;" id="inputModalTitle">Change...</h3>
            <input type="text" id="genericInput" class="modal-input">
        </div>
        <div class="modal-actions">
            <button class="modal-btn cancel" onclick="closeModals()" data-i18n="cancel">Cancel</button>
            <button class="modal-btn" onclick="saveInput()" data-i18n="save">Save</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
        <div class="modal-content">
            <h3 style="margin: 0 0 10px 0;" id="confirmTitle">Are you sure?</h3>
            <p style="color: var(--text-muted); font-size: 14px; margin: 0;" id="confirmDesc">...</p>
        </div>
        <div class="modal-actions">
            <button class="modal-btn cancel" onclick="closeModals()" data-i18n="cancel">Cancel</button>
            <button class="modal-btn" id="confirmActionBtn" style="font-weight: 600;"></button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="cropModal">
    <div class="crop-box">
        <div class="crop-header">
            <button onclick="closeModals()" data-i18n="back">Back</button>
            <div style="font-weight: 600;">Move & Scale</div>
            <button class="done" onclick="saveCrop()" data-i18n="done">Done</button>
        </div>
        <div class="canvas-container">
            <canvas id="cropCanvas" width="340" height="340"></canvas>
            <div class="crop-mask"></div>
        </div>
        <div class="crop-footer">
            <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:var(--text-muted);"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-5z"/></svg>
            <input type="range" class="zoom-slider" id="zoomSlider" min="0.1" max="3" step="0.01" value="1">
            <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:var(--text-muted);"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-5z"/></svg>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api';
    let username = localStorage.getItem('djUsername');
    if(!username) window.location.href = '/register.html'; // Protect profile page from guests

    const dict = {
        en: { account: "Account", language: "Language", username: "Username", email: "Email", phone: "Phone Number", edit: "Edit", changePhoto: "Change Photo", deleteAccount: "Delete Account", back: "Back", cancel: "Cancel", save: "Save", done: "Done" },
        zh: { account: "账户", language: "语言", username: "用户名", email: "邮箱", phone: "手机号", edit: "编辑", changePhoto: "更换照片", deleteAccount: "删除账户", back: "返回", cancel: "取消", save: "保存", done: "完成" }
    };
    
    let currentLang = localStorage.getItem('djLang') || 'en';
    function applyLanguage() {
        document.getElementById(`lang-${currentLang}`).classList.add('active');
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(dict[currentLang][key]) el.innerText = dict[currentLang][key];
        });
    }

    function triggerLangChange(lang) {
        if(lang === currentLang) return;
        document.getElementById('confirmTitle').innerText = lang === 'zh' ? "更改语言" : "Change Language";
        document.getElementById('confirmDesc').innerText = lang === 'zh' ? "确定要将语言更改为中文吗？" : "Are you sure you want to switch to English?";
        const btn = document.getElementById('confirmActionBtn');
        btn.innerText = lang === 'zh' ? "确定" : "Confirm";
        btn.style.color = "var(--accent)";
        btn.onclick = () => { localStorage.setItem('djLang', lang); window.location.reload(); };
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function showToast(msg, isError = false) { 
        const t = document.getElementById('toast'); 
        t.className = 'toast'; if(isError) t.classList.add('error');
        t.innerHTML = `<span style="color:${isError ? 'white' : 'var(--accent)'}; font-weight:bold;">${isError ? '!' : '✓'}</span> ${msg}`; 
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500); 
    }

    function switchView(view) {
        document.querySelectorAll('.sidebar-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(`btn-${view}`).classList.add('active');
        document.getElementById(`view-${view}`).classList.add('active');
    }

    async function loadProfile() {
        const res = await fetch(`${API_URL}/users/${username}`);
        if(res.ok) {
            const data = await res.json();
            document.getElementById('valUsername').innerText = data.username;
            document.getElementById('valTokensHeader').innerText = data.tokens;
            document.getElementById('valEmail').innerText = data.email;
            document.getElementById('valPhone').innerText = data.phone;
            if(data.profilePic) document.getElementById('profDisplay').src = data.profilePic;
        }
    }

    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

    let currentEditType = null;
    function openInputModal(type) {
        currentEditType = type;
        const map = {
            'username': { title: currentLang==='zh'?'更改用户名':'Change Username', val: document.getElementById('valUsername').innerText },
            'email': { title: currentLang==='zh'?'更改邮箱':'Change Email', val: document.getElementById('valEmail').innerText },
            'phone': { title: currentLang==='zh'?'更改手机号':'Change Phone', val: document.getElementById('valPhone').innerText }
        };
        document.getElementById('inputModalTitle').innerText = map[type].title;
        document.getElementById('genericInput').value = map[type].val === '-' ? '' : map[type].val;
        document.getElementById('inputModal').style.display = 'flex';
    }

    async function saveInput() {
        const val = document.getElementById('genericInput').value;
        if(!val) return closeModals();
        
        const endpoint = `/users/${username}/change-${currentEditType}`;
        const bodyKey = `new${currentEditType.charAt(0).toUpperCase() + currentEditType.slice(1)}`;
        
        const res = await fetch(API_URL + endpoint, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({[bodyKey]: val}) });
        
        if(res.ok) {
            if(currentEditType === 'username') { username = val; localStorage.setItem('djUsername', username); }
            showToast(currentLang==='zh'?"已更新!":"Updated!"); loadProfile(); closeModals();
        } else showToast(await res.text(), true);
    }

    function openDeleteModal() {
        document.getElementById('confirmTitle').innerText = currentLang==='zh' ? "删除账户" : "Delete Account";
        document.getElementById('confirmDesc').innerText = currentLang==='zh' ? "此操作无法撤销。" : "This action cannot be undone.";
        const btn = document.getElementById('confirmActionBtn');
        btn.innerText = currentLang==='zh' ? "删除" : "Delete";
        btn.style.color = "var(--danger)";
        btn.onclick = async () => {
            const res = await fetch(`${API_URL}/users/${username}`, { method: 'DELETE' });
            if(res.ok) { localStorage.removeItem('djUsername'); window.location.href = '/register.html'; }
        };
        document.getElementById('confirmModal').style.display = 'flex';
    }

    const canvas = document.getElementById('cropCanvas'); const ctx = canvas.getContext('2d'); const slider = document.getElementById('zoomSlider');
    let img = new Image(); let imgX = 0, imgY = 0, scale = 1, minScale = 0.1; let isDragging = false, startX, startY;

    document.getElementById('photoInput').addEventListener('change', function(e) {
        if(!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            img.onload = () => {
                const scaleX = 340 / img.width; const scaleY = 340 / img.height; minScale = Math.max(scaleX, scaleY);
                scale = minScale; slider.min = minScale; slider.max = minScale * 4; slider.value = scale;
                imgX = (340 - img.width * scale) / 2; imgY = (340 - img.height * scale) / 2;
                document.getElementById('cropModal').style.display = 'flex'; draw();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]); this.value = ''; 
    });

    function draw() { ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, imgX, imgY, img.width * scale, img.height * scale); }

    slider.addEventListener('input', () => {
        const oldScale = scale; scale = parseFloat(slider.value);
        imgX = 170 - (170 - imgX) * (scale / oldScale); imgY = 170 - (170 - imgY) * (scale / oldScale); draw();
    });

    function startDrag(e) { isDragging = true; const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; startX = clientX - imgX; startY = clientY - imgY; }
    function drag(e) { if(!isDragging) return; e.preventDefault(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; imgX = clientX - startX; imgY = clientY - startY; draw(); }
    function endDrag() { isDragging = false; }

    canvas.addEventListener('mousedown', startDrag); canvas.addEventListener('mousemove', drag); window.addEventListener('mouseup', endDrag);
    canvas.addEventListener('touchstart', startDrag); canvas.addEventListener('touchmove', drag, {passive: false}); window.addEventListener('touchend', endDrag);

    async function saveCrop() {
        showToast(currentLang==='zh'?"保存中...":"Saving..."); closeModals();
        
        const offCanvas = document.createElement('canvas'); offCanvas.width = 340; offCanvas.height = 340; const offCtx = offCanvas.getContext('2d');
        offCtx.fillStyle = '#000'; offCtx.fillRect(0,0,340,340); offCtx.drawImage(img, imgX, imgY, img.width * scale, img.height * scale);
        const imageBase64 = offCanvas.toDataURL('image/png');
        
        const res = await fetch(`${API_URL}/users/${username}/profile-pic`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({imageBase64}) });
        if(res.ok) { document.getElementById('profDisplay').src = (await res.json()).profilePic; showToast(currentLang==='zh'?"照片已更新":"Photo updated!"); } else { showToast("Failed to upload.", true); }
    }

    applyLanguage(); loadProfile();
</script>
</body>
</html>
